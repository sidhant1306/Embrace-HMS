spring.application.name=HMS

spring.datasource.url=jdbc:postgresql://localhost:5432/hospital-database
spring.datasource.username=${USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=${JWT_EXPIRATION}

# Billing (amounts in paise; lab tests without explicit price use default)
billing.consultation-fee-paise=50000
billing.tax-percent=5
billing.default-lab-test-paise=150000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
app.upload.dir=uploads/lab-reports
